<style>

/* ── RESET & VARIABLES ─────────────────── */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:#0F1117;color:#F7F5F0;}

:root{
  --ink:#0F1117;
  --ink-soft:#1A1D27;
  --amber:#C8861E;
  --amber-lt:#E8A832;
  --cream:#F7F5F0;
  --muted:#8B8A98;
  --teal:#0B7A60;
  --teal-lt:#0DD4A8;
}

/* ── MINI NAV ──────────────────────────── */
.chat-nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:rgba(15,17,23,0.96);
  backdrop-filter:blur(12px);
  border-bottom:0.5px solid rgba(247,245,240,0.06);
  height:52px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
}
.chat-nav-logo{display:flex;flex-direction:column;gap:1px;}
.ng{font-family:'Playfair Display',serif;font-size:16px;color:#F7F5F0;line-height:1;}
.nc{font-family:'Playfair Display',serif;font-size:16px;font-style:italic;color:#E8A832;line-height:1;}
.chat-nav-back{font-size:12px;color:var(--muted);text-decoration:none;transition:color .2s;}
.chat-nav-back:hover{color:#F7F5F0;}

/* ── MODAL OVERLAY ─────────────────────── */

/* ── ONBOARDING FIELDS ─────────────────── */

.ob-textarea:focus{border-color:rgba(200,134,30,0.4);}

.ob-input:focus{border-color:rgba(200,134,30,0.4);}

/* ── CHAT PAGE ─────────────────────────── */
/* ── CHAT PAGE LAYOUT ─────────────────── */
.chat-page{
  height:100vh;
  background:var(--ink);
  display:flex;flex-direction:column;
  overflow:hidden;position:relative;
}
.chat-page-glow{
  position:fixed;bottom:-200px;right:-100px;
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(200,134,30,0.04) 0%,transparent 65%);
  pointer-events:none;z-index:0;
}

/* ── NAV ──────────────────────────────── */
.cn{
  height:52px;flex-shrink:0;
  background:rgba(15,17,23,0.98);
  border-bottom:0.5px solid rgba(247,245,240,0.07);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;z-index:10;
}
.cn-left{display:flex;align-items:center;gap:12px;}
.cn-back{
  font-size:13px;color:var(--muted);
  background:none;border:none;cursor:pointer;padding:0;
  transition:color .2s;display:flex;align-items:center;gap:4px;
}
.cn-back:hover{color:#F7F5F0;}
.cn-sep{width:0.5px;height:16px;background:rgba(247,245,240,0.1);}
.cn-brand{display:flex;align-items:baseline;}
.cn-ghost{font-family:'Playfair Display',serif;font-size:16px;color:#F7F5F0;}
.cn-coach{font-family:'Playfair Display',serif;font-size:16px;font-style:italic;color:var(--amber-lt);}
.cn-status{display:flex;align-items:center;gap:6px;}
.cn-dot{width:6px;height:6px;background:#0DD4A8;border-radius:50%;animation:cpulse 2.5s infinite;}
@keyframes cpulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.cn-label{font-size:12px;color:rgba(247,245,240,0.45);}
.cn-label b{color:rgba(247,245,240,0.75);font-weight:500;}

/* ── MESSAGES ─────────────────────────── */
.chat-msgs{
  flex:1;overflow-y:auto;
  position:relative;z-index:1;
  scroll-behavior:smooth;
}
.chat-msgs::-webkit-scrollbar{width:3px;}
.chat-msgs::-webkit-scrollbar-thumb{background:rgba(247,245,240,0.08);border-radius:2px;}
.msgs-inner{
  max-width:680px;margin:0 auto;
  padding:0 20px;
  display:flex;flex-direction:column;gap:16px;
  min-height:100%;justify-content:flex-end;
  padding-bottom:8px;
}

/* ── WELCOME STATE ────────────────────── */
.chat-welcome{
  display:flex;flex-direction:column;align-items:center;
  text-align:center;
  padding:40px 16px 8px;
  gap:0;
  justify-content:center;
  flex:1;
}
.cw-avatar{
  width:52px;height:52px;border-radius:14px;
  background:rgba(200,134,30,0.08);
  border:0.5px solid rgba(200,134,30,0.18);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;margin-bottom:14px;
}
.cw-name{
  font-family:'Playfair Display',serif;
  font-size:18px;font-weight:500;color:#F7F5F0;
  margin-bottom:6px;
}
.cw-name em{font-style:italic;color:var(--amber-lt);}
.cw-desc{
  font-size:13px;color:var(--muted);
  line-height:1.6;max-width:340px;margin-bottom:28px;
}
/* Starter chips — inside welcome, shown only before first message */
.cw-chips{
  display:flex;flex-wrap:wrap;
  gap:7px;justify-content:center;
  max-width:520px;
}
.cw-chip{
  background:rgba(247,245,240,0.04);
  border:0.5px solid rgba(247,245,240,0.1);
  border-radius:20px;
  padding:7px 14px;
  font-size:12px;color:rgba(247,245,240,0.6);
  cursor:pointer;transition:all .2s;
  white-space:nowrap;
}
.cw-chip:hover{
  background:rgba(200,134,30,0.08);
  border-color:rgba(200,134,30,0.22);
  color:#F7F5F0;
}

/* ── MESSAGE BUBBLES ──────────────────── */
.msg-row{display:flex;flex-direction:column;gap:3px;}
.msg-sender{
  font-size:10px;font-weight:500;
  text-transform:uppercase;letter-spacing:.08em;
  color:rgba(139,138,152,0.5);padding:0 4px;
}
.msg-bubble{
  padding:12px 15px;border-radius:14px;
  font-size:14px;line-height:1.7;max-width:86%;
}
.msg-user .msg-bubble{
  background:rgba(247,245,240,0.07);
  color:rgba(247,245,240,0.85);
  border-radius:14px 14px 4px 14px;
  align-self:flex-end;
}
.msg-user .msg-sender{text-align:right;}
.msg-alex .msg-bubble{
  background:#1C2030;
  border:0.5px solid rgba(247,245,240,0.07);
  color:#F7F5F0;
  border-radius:4px 14px 14px 14px;
  align-self:flex-start;
}
.msg-alex .msg-bubble strong{color:var(--amber-lt);}
.msg-alex .msg-bubble em{color:rgba(247,245,240,0.65);}

/* Typing indicator */
.typing-indicator{
  display:flex;align-items:center;gap:5px;
  padding:13px 16px;
  background:#1C2030;
  border:0.5px solid rgba(247,245,240,0.07);
  border-radius:4px 14px 14px 14px;
  width:fit-content;
}
.typing-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--amber);opacity:.4;
  animation:tdot 1.4s infinite;
}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,60%,100%{opacity:.4;transform:translateY(0);}30%{opacity:1;transform:translateY(-4px);}}

/* ── INPUT ────────────────────────────── */
.chat-input-wrap{
  flex-shrink:0;
  padding:10px 20px 14px;
  background:rgba(15,17,23,0.98);
  border-top:0.5px solid rgba(247,245,240,0.06);
  z-index:10;
}
.chat-input-inner{
  max-width:680px;margin:0 auto;
  display:flex;gap:8px;align-items:flex-end;
}
.chat-textarea{
  flex:1;background:#1C2030;
  border:0.5px solid rgba(247,245,240,0.1);
  border-radius:12px;padding:11px 14px;
  font-family:'DM Sans',sans-serif;font-size:14px;color:#F7F5F0;
  resize:none;outline:none;
  min-height:46px;max-height:120px;
  line-height:1.5;transition:border-color .2s;overflow-y:auto;
}
.chat-textarea::placeholder{color:rgba(139,138,152,0.4);}
.chat-textarea:focus{border-color:rgba(200,134,30,0.35);}
.chat-send{
  width:42px;height:42px;border-radius:10px;
  background:var(--amber);border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;
}
.chat-send:hover{background:var(--amber-lt);}
.chat-send:disabled{background:rgba(200,134,30,0.2);cursor:not-allowed;}
.chat-send svg{width:17px;height:17px;fill:var(--ink);}
.chat-hint{
  font-size:11px;color:rgba(139,138,152,0.3);
  text-align:center;margin-top:6px;
}

/* ── MOBILE ───────────────────────────── */
@media(max-width:768px){
  .cn{padding:0 16px;}
  .msgs-inner{padding:0 14px;}
  .chat-input-wrap{padding:8px 14px 12px;}
  .msg-bubble{font-size:13px;max-width:94%;}
  .cw-chips{gap:6px;}
  .cw-chip{font-size:12px;padding:6px 12px;}
}

/* Adjust chat-page top padding for fixed nav */
.chat-page{padding-top:52px !important;}

/* v30 — gc-message bubbles (rendered by chat.js) */
.gc-message{max-width:80%;padding:13px 17px;border-radius:14px;font-size:14.5px;line-height:1.62;margin-bottom:14px;white-space:pre-wrap;word-wrap:break-word;}
.gc-message--user{background:#C8861E;color:#0F1117;margin-left:auto;border-bottom-right-radius:4px;}
.gc-message--assistant{background:rgba(247,245,240,0.06);color:#F7F5F0;border:0.5px solid rgba(247,245,240,0.08);border-bottom-left-radius:4px;}
.gc-message--thinking{color:rgba(247,245,240,0.5);font-style:italic;}
#gc-goal-bar-wrap{padding:10px 20px 0;display:none;}
#gc-goal-bar-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
#gc-goal-bar-label{font-size:11px;color:rgba(247,245,240,0.4);font-family:'DM Sans',sans-serif;letter-spacing:.03em;text-transform:uppercase;}
#gc-goal-bar-pct{font-size:11px;color:rgba(247,245,240,0.7);font-weight:600;font-family:'DM Sans',sans-serif;}
#gc-goal-bar-track{height:5px;background:rgba(247,245,240,0.08);border-radius:999px;overflow:hidden;}
#gc-goal-bar{height:100%;width:0%;background:#C8861E;border-radius:999px;transition:width .6s ease;}
#gc-goal-bar-meta{font-size:11px;color:rgba(247,245,240,0.4);margin-top:6px;font-family:'DM Sans',sans-serif;line-height:1.5;}

</style>
</head>
<body>

<!-- Chat Interface -->
<div class="chat-page">
  <div class="chat-page-glow"></div>

  <!-- Slim nav — single action: Back to account -->
  <div class="cn">
    <div class="cn-left">
      <a class="cn-back" href="/account/" style="text-decoration:none;">&larr; Back</a>
      <div class="cn-sep"></div>
      <div class="cn-brand">
        <span class="cn-ghost">Ghost</span><span class="cn-coach">Coach</span>
      </div>
    </div>
    <div class="cn-status">
      <div class="cn-dot"></div>
      <div class="cn-label"><b>Marcus</b> is online</div>
    </div>
  </div>

  <!-- Goal progress bar — hidden until GC.GOAL_BAR_ENABLED and a session exists -->
  <div id="gc-goal-bar-wrap">
    <div id="gc-goal-bar-head">
      <span id="gc-goal-bar-label">90-day goal progress</span>
      <span id="gc-goal-bar-pct">0%</span>
    </div>
    <div id="gc-goal-bar-track"><div id="gc-goal-bar"></div></div>
    <div id="gc-goal-bar-meta"></div>
  </div>

  <!-- Messages -->
  <div class="chat-msgs" id="chat-msgs">
    <div class="msgs-inner" id="gc-chat-messages">
      <div class="chat-welcome" id="chat-welcome">
        <div class="cw-avatar">&#128123;</div>
        <div class="cw-name" id="gc-session-status">Marcus is loading your context&hellip;</div>
        <div class="cw-desc">Pulling in your profile and history so this session picks up where you are.</div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="chat-input-wrap">
    <div class="chat-input-inner">
      <textarea
        class="chat-textarea"
        id="gc-chat-input"
        placeholder="Tell Marcus what you're working on..."
        rows="1"
      ></textarea>
      <button class="chat-send" id="gc-send-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;">
      <div class="chat-hint">Enter to send &middot; Shift+Enter for new line</div>
      <button
        id="gc-end-btn"
        style="background:rgba(11,122,96,0.12);border:0.5px solid rgba(11,122,96,0.3);border-radius:8px;padding:5px 12px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:#0DD4A8;cursor:pointer;transition:all .2s;"
        onmouseover="this.style.background='rgba(11,122,96,0.22)'"
        onmouseout="this.style.background='rgba(11,122,96,0.12)'"
      >End session &amp; get recap &rarr;</button>
    </div>
  </div>
</div>

  <!-- v23: GhostCoach JS integration -->
  <script src="/js/config.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/webhooks.js"></script>
  <script src="/js/pages/chat.js"></script>
  <script src="/js/cookie-banner.js"></script>
</body>
</html>
